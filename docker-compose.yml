services:
  dailynode:
    build: .
    container_name: dailynode-bot
    restart: unless-stopped
    init: true
    environment:
      - NODE_ENV=production
      - TZ=America/New_York
    env_file:
      - .env
    volumes:
      # Mount config.json to persist daily problem data
      - ./config.json:/app/config.json
    healthcheck:
      test: ["CMD-SHELL", "ps -p 1 -o comm= | grep -q node"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
